<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карта Когалыма — Открой Когалым</title>
  <meta name="description" content="Интерактивная карта Когалыма: организации, категории, поиск, карта и маршрут.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="header">
  <a class="brand" href="index.html" aria-label="Открой Когалым">
    <img src="images/logo.png" alt="Открой Когалым">
    <span>ОТКРОЙ<br>КОГАЛЫМ</span>
  </a>
  <nav>
    <a href="index.html">Главная</a>
    <a href="routes.html">Маршруты</a>
    <a href="places.html">Каталог</a>
    <a class="active" href="map.html">Карта</a>
    <a href="events.html">Афиша</a>
    <a href="announcements.html">Объявления</a>
    <a href="admin.html">Админка</a>
  </nav>
  <div class="right-head">
    <span class="icon">⌕</span>
    <span class="icon">♡</span>
    <a class="about" href="about.html">О городе</a>
    <div class="weather weather--loading"><span>🌡️</span><b>…</b><small>Когалым<br>загрузка</small></div>
  </div>
</header>

<main class="city-map-page">
  <section class="city-map-hero">
    <span>Интерактивная карта</span>
    <h1>Карта Когалыма</h1>
    <p>Ищите организации, выбирайте категории и стройте маршрут в Яндекс Картах.</p>
    <div class="city-map-search">
      <input id="mapSearch" type="search" placeholder="Поиск: больница, школа, кафе, парк..." autocomplete="off">
      <button id="geoBtn" type="button">Моя геолокация</button>
    </div>
  </section>

  <section class="city-map-layout">
    <aside class="city-map-sidebar">
      <div class="city-map-sidebar-head"><b>Объекты</b><span id="mapCount">0</span></div>
      <div class="map-filters" id="mapFilters"></div>
      <div class="map-point-list" id="mapPointList"></div>
    </aside>
    <section class="city-map-panel">
      <div class="city-map-actions">
        <a id="openMapLink" href="https://yandex.ru/maps/?text=Когалым" target="_blank" rel="noopener">Открыть карту</a>
        <a id="routeMapLink" href="https://yandex.ru/maps/?rtext=~Когалым&rtt=auto" target="_blank" rel="noopener">Построить маршрут</a>
      </div>
      <iframe id="cityMapFrame" title="Карта Когалыма" src="https://yandex.ru/map-widget/v1/?text=Когалым&z=12" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </section>
  </section>
</main>
<script src="map.js"></script>
<script src="weather.js"></script>
</body>
</html>
